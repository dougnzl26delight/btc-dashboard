name: Refresh dashboard data

# Runs precompute on GitHub's servers hourly and commits the refreshed
# panel caches, so the Streamlit Cloud dashboard stays current with ZERO
# dependence on Dave's laptop or wifi. Manual run available too.
# Hourly (not 3h) because GitHub free-tier SKIPS scheduled runs on
# low-activity repos — more attempts = fewer stale gaps. Public repo,
# so Action minutes are unlimited/free; each run's own commit also keeps
# the repo "active" which itself reduces schedule-skipping.

on:
  schedule:
    - cron: '17 * * * *'     # hourly (UTC), 17 min past (avoids the congested :00 slot)
  workflow_dispatch: {}       # adds a "Run workflow" button

permissions:
  contents: write             # allow committing the refreshed caches back

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run precompute (per-panel failures are tolerated)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUTF8: '1'
        run: python precompute_dashboard.py || true

      - name: Commit refreshed caches
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .panel_cache .simpleton_daily_brief.json .simpleton_brief_state.json 2>/dev/null || git add -f .panel_cache
          if git diff --cached --quiet; then
            echo "No cache changes this run."
          else
            git commit -m "data: refresh dashboard caches [skip ci]"
            # self-heal if main advanced since checkout (e.g. overlapping runs)
            git push || { git pull --rebase --autostash origin main && git push; }
          fi
