name: Refresh dashboard data

# FALLBACK refresher. Primary freshness now comes from the always-on local
# task Crypto_dashboard_push, which pushes the locally-recomputed caches every
# hour (see push_dashboard.py). This Action is the backstop for when that
# machine is OFF: it recomputes on GitHub's servers and commits the caches with
# ZERO dependence on the laptop. Every 6h (not hourly) since it's only a
# fallback — fewer redundant commits. GitHub free-tier may still skip some
# scheduled runs; that's acceptable for a backstop. Manual run available too.

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6h (UTC), :17 past — fallback cadence only
  workflow_dispatch: {}       # adds a "Run workflow" button

permissions:
  contents: write             # allow committing the refreshed caches back

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run precompute (per-panel failures are tolerated)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUTF8: '1'
        run: python precompute_dashboard.py || true

      - name: Commit refreshed caches
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .panel_cache .simpleton_daily_brief.json .simpleton_brief_state.json 2>/dev/null || git add -f .panel_cache
          if git diff --cached --quiet; then
            echo "No cache changes this run."
          else
            git commit -m "data: refresh dashboard caches [skip ci]"
            # Self-heal if main advanced since checkout (overlapping runs / local push).
            # A lost push race is NOT a failure: another refresher already published
            # fresh caches this cycle, so exit 0 instead of emailing a failed job.
            if git push; then exit 0; fi
            echo "push rejected; rebasing onto latest and retrying"
            if git pull --rebase --autostash origin main && git push; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            echo "::notice::Lost the push race — fresh caches already published this cycle; not failing."
          fi
